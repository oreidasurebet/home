<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Rei da Surebet - Ferramentas, Calculadoras e Extensões para Apostas Esportivas</title>
  
  <!-- SEO -->
  <meta name="description" content="O Rei da Surebet - Ferramentas, calculadoras, scanners e extensões para apostas esportivas. Encontre surebets, calcule stakes perfeitas, maximize seus lucros e minimize riscos nas apostas.">
  <meta name="keywords" content="surebet, apostas esportivas, calculadora surebet, calculadora trade, skewed, extensão scanner, extensão limite de aposta, ferramentas para apostas, scanner de odds, scanner surebet, apostas sem risco, rei da surebet">
  <meta name="author" content="O Rei da Surebet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="imagens/favicon.png" type="image/png">

  <style>
    /* ================= ESTRUTURA DO LAYOUT COM CHAT INJETADO ================= */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow-x: hidden;
    }

    /* Grid do site: Conteúdo à esquerda e Chat de 520px à direita */
    .site-container {
      display: grid;
      grid-template-columns: 1fr 520px;
      min-height: 100vh;
      width: 100vw;
      transition: grid-template-columns 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Estado quando o chat está fechado por padrão */
    .site-container.chat-oculto {
      grid-template-columns: 1fr 0px;
    }

    /* Oculta totalmente o iframe e o contêiner ao fechar */
    .site-container.chat-oculto .coluna-chat-lateral {
      visibility: hidden;
      overflow: hidden;
    }

    /* Conteúdo Principal do Site (Garante fluxo correto) */
    .conteúdo-principal-site {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ================= 🟢 BARRA LATERAL DO CHAT (XAT.COM) ================= */
    .coluna-chat-lateral {
      display: flex;
      flex-direction: column;
      background-color: #161616;
      border-left: 1px solid #262626;
      height: 100vh;
      position: sticky;
      top: 0;
      transition: transform 0.3s ease, visibility 0.3s ease;
    }

    .header-chat-titulo {
      background-color: #111;
      padding: 15px;
      border-bottom: 1px solid #262626;
      font-size: 13px;
      font-weight: bold;
      color: #cca353;
      text-align: center;
      letter-spacing: 0.5px;
      font-family: sans-serif;
    }

    .container-iframe-xat {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    .container-iframe-xat iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ================= 🔘 BOTÃO FLUTUANTE DO CHAT ================= */
    .btn-chat-flutuante {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      background-color: #161616;
      border: 2px solid #cca353;
      border-radius: 50%;
      color: #cca353;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      z-index: 9999;
      transition: all 0.2s ease;
    }
    .btn-chat-flutuante:hover {
      transform: scale(1.05);
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 0 0 12px #cca353;
    }

    /* ================= 📱 RESPONSIVIDADE MOBILE (ABRE ACIMA DO IFRAME / CONTEÚDO) ================= */
    @media (max-width: 900px) {
      .site-container {
        display: flex;
        flex-direction: column;
      }
      
      /* Muda a ordem visual: Chat passa a ficar no topo (ordem 1) e o conteúdo embaixo (ordem 2) */
      .coluna-chat-lateral {
        order: 1;
        width: 100% !important;
        height: 450px; /* Altura controlada para o chat no mobile */
        position: relative;
        border-left: none;
        border-bottom: 1px solid #262626;
      }

      .conteúdo-principal-site {
        order: 2;
      }

      /* Quando oculto no mobile, remove totalmente do fluxo vertical */
      .site-container.chat-oculto .coluna-chat-lateral {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- 🔘 BOTÃO FLUTUANTE DO CHAT -->
  <button class="btn-chat-flutuante" onclick="alternarChatSite()" title="Conversar com a Comunidade">💬</button>

  <!-- Container Geral inicializado com a classe 'chat-oculto' para vir fechado por padrão -->
  <div class="site-container chat-oculto" id="layout-global-site">
    
    <!-- LADO ESQUERDO: CONTEÚDO ATUAL DO SEU SITE -->
    <div class="conteúdo-principal-site">
      <header>
        <div class="logo">
          <a href="https://oreidasurebet.com" target="_blank">
            <img src="imagens/logo.png" alt="O Rei da Surebet">
          </a>
        </div>

        <div class="menu">
          <button class="menu-button">☰ Menu</button>
          <div class="dropdown">
            <strong>CALCULADORAS</strong>
            <a href="calculadora_de_surebet_e_skewed">Calculadora de Surebet e Skewed</a>
            <a href="calculadora_trade_no_empate">Calculadora Trade no Empate</a>
            <strong>FERRAMENTAS</strong>
            <a href="extensão_fullscreen_bet">Extensão FullScreen Bet</a>
            <a href="../extensao_scanner_odds_agora">Extensão Scanner OddsAgora 2.0</a>
          </div>
        </div>
      </header>

      <main>
        <h1>Bem-vindo ao Rei da Surebet</h1>
        <p>Selecione uma opção no menu para começar.</p>
      </main>
    </div>

    <!-- LADO DIREITO: CHAT DA COMUNIDADE (XAT.COM) -->
    <div class="coluna-chat-lateral">
      <div class="header-chat-titulo">
        💬 CHATROOM PÚBLICO
      </div>
      <div class="container-iframe-xat">
        <iframe src="https://xat.com/embed/chat.php#id=220516405&gn=oreidasurebet" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

  </div>

  <script>
    // Função para alternar visibilidade (abre/fecha o xat)
    function alternarChatSite() {
        const layout = document.getElementById('layout-global-site');
        layout.classList.toggle('chat-oculto');
    }
  </script>

</body>
</html>
