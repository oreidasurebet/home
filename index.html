<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Rei da Surebet - Ferramentas, Calculadoras e Extensões para Apostas Esportivas</title>
  
  <!-- SEO -->
  <meta name="description" content="O Rei da Surebet - Ferramentas, calculadoras, scanners e extensões para apostas esportivas. Encontre surebets, calcule stakes perfeitas, maximize seus lucros e minimize riscos nas apostas.">
  <meta name="keywords" content="surebet, apostas esportivas, calculadora surebet, calculadora trade, skewed, extensão scanner, extensão limite de aposta, ferramentas para apostas, scanner de odds, scanner surebet, apostas sem risco, rei da surebet">
  <meta name="author" content="O Rei da Surebet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="imagens/favicon.png" type="image/png">

  <style>
    /* ================= ESTRUTURA DE DIVISÃO DOS IFRAMES ================= */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* Grid do site: API na esquerda e Xat de 580px na direita */
    .site-container {
      display: grid;
      grid-template-columns: 1fr 580px;
      height: 100vh;
      width: 100vw;
      transition: grid-template-columns 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Estado inicial: Oculta o xat e expande a API em 100% da tela */
    .site-container.chat-oculto {
      grid-template-columns: 1fr 0px;
    }

    /* Garante que o conteúdo do xat suma totalmente ao fechar */
    .site-container.chat-oculto .coluna-xat-lateral {
      visibility: hidden;
      overflow: hidden;
    }

    /* Área da Esquerda: Renderiza o conteúdo do seu site e o iframe da API */
    .coluna-conteudo-principal {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    /* Estilização para o iframe da sua API ocupar todo o espaço restante */
    .iframe-api-container {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .iframe-api-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ================= 🟢 BARRA LATERAL DIREITA (XAT.COM) ================= */
    .coluna-xat-lateral {
      display: flex;
      flex-direction: column;
      background-color: #161616;
      border-left: 1px solid #262626;
      height: 100vh;
    }

    .header-chat-titulo {
      background-color: #111;
      padding: 15px;
      border-bottom: 1px solid #262626;
      font-size: 13px;
      font-weight: bold;
      color: #cca353;
      text-align: center;
      letter-spacing: 0.5px;
      font-family: sans-serif;
    }

    .container-iframe-xat {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .container-iframe-xat iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ================= 🔘 BOTÃO FLUTUANTE DA PÁGINA ================= */
    .btn-chat-site-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 140px;
      height: 48px;
      background-color: #161616;
      border: 2px solid #cca353;
      border-radius: 24px;
      color: #cca353;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      z-index: 9999;
      transition: all 0.2s ease;
      font-family: sans-serif;
    }
    .btn-chat-site-toggle:hover {
      transform: scale(1.05);
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 0 0 12px #cca353;
    }

    /* ================= 📱 RESPONSIVIDADE MOBILE ================= */
    @media (max-width: 900px) {
      .site-container {
        display: flex;
        flex-direction: column;
      }
      .coluna-xat-lateral {
        order: 1;
        width: 100% !important;
        height: 400px;
        border-left: none;
        border-bottom: 1px solid #262626;
      }
      .coluna-conteudo-principal {
        order: 2;
      }
      .site-container.chat-oculto .coluna-xat-lateral {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- 🔘 BOTÃO FLUTUANTE QUE GERENCIA OS DOIS IFRAMES -->
  <button id="btn-toggle-chat" class="btn-chat-site-toggle" onclick="alternarLayoutChat()">
    💬 Abrir Chat
  </button>

  <!-- Container estrutural em Grid iniciado com 'chat-oculto' -->
  <div class="site-container chat-oculto" id="layout-container-global">
    
    <!-- COLUNA ESQUERDA: SUA PÁGINA COM O IFRAME DA SUA API -->
    <div class="coluna-conteudo-principal">
      <header>
        <div class="logo">
          <a href="https://oreidasurebet.com" target="_blank">
            <img src="imagens/logo.png" alt="O Rei da Surebet">
          </a>
        </div>

        <div class="menu">
          <button class="menu-button">☰ Menu</button>
          <div class="dropdown">
            <strong>CALCULADORAS</strong>
            <a href="calculadora_de_surebet_e_skewed">Calculadora de Surebet e Skewed</a>
            <a href="calculadora_trade_no_empate">Calculadora Trade no Empate</a>
            <strong>FERRAMENTAS</strong>
            <a href="extensão_fullscreen_bet">Extensão FullScreen Bet</a>
            <a href="../extensao_scanner_odds_agora">Extensão Scanner OddsAgora 2.0</a>
          </div>
        </div>
      </header>

      <main>
        <h1>Bem-vindo ao Rei da Surebet</h1>
        <p>Selecione uma option no menu para começar.</p>
      </main>

      <!-- SEU IFRAME DA API INJETADO AQUI DENTRO DA ESTRUTURA -->
      <div class="iframe-api-container">
        <iframe src="https://api.oreidasurebet.com" allowtransparency="true"></iframe>
      </div>
    </div>

    <!-- COLUNA DIREITA: IFRAME DO XAT.COM (APARECE EMPURRANDO A API) -->
    <div class="coluna-xat-lateral">
      <div class="header-chat-titulo">
        💬 CHATROOM PÚBLICO DO REI
      </div>
      <div class="container-iframe-xat">
        <iframe src="https://xat.com/embed/chat.php#id=220516405&gn=oreidasurebet" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

  </div>

  <script>
    function alternarLayoutChat() {
        const container = document.getElementById('layout-container-global');
        const botao = document.getElementById('btn-toggle-chat');
        
        container.classList.toggle('chat-oculto');
        
        if (container.classList.contains('chat-oculto')) {
            botao.innerHTML = '💬 Abrir Chat';
        } else {
            botao.innerHTML = '❌ Fechar Chat';
        }
    }
  </script>

</body>
</html>
