<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>O Rei da Surebet</title>

<link
    rel="icon"
    href="imagens/favicon.png"
    type="image/png"
>

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100vh;

    overflow:hidden;

    background:#0d0d0d;

    font-family:
        Segoe UI,
        Tahoma,
        Geneva,
        Verdana,
        sans-serif;
}

/* ================= HEADER ================= */

header{

    width:100%;
    height:68px;

    background:#000;

    border-bottom:1px solid #262626;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 18px;

    position:relative;

    z-index:10000;
}

/* ================= LOGO ================= */

.logo img{

    height:42px;

    display:block;
}

/* ================= MENU ================= */

.menu{
    position:relative;
}

.menu-button{

    background:none;
    border:none;

    color:#cca353;

    font-size:18px;

    cursor:pointer;
}

.dropdown{

    position:absolute;

    top:50px;
    right:0;

    width:260px;

    background:#111;

    border:1px solid #262626;

    border-radius:10px;

    padding:15px;

    display:none;

    z-index:9999;
}

.menu:hover .dropdown{
    display:block;
}

.dropdown strong{

    display:block;

    color:#cca353;

    margin:
        10px 0;
}

.dropdown a{

    display:block;

    color:#ddd;

    text-decoration:none;

    padding:7px 0;
}

.dropdown a:hover{
    color:#ffd700;
}

/* ================= BOTÃO CHAT DESKTOP (MELHORADO E DESGRUDADO DO HEADER) ================= */

.etiqueta-chat{

    position:fixed;

    top:calc(50% + 34px); /* Centraliza perfeitamente considerando a área útil abaixo do header */

    right:0;

    transform:translateY(-50%);

    width:44px;
    height:180px;

    background:#111; /* Cor um pouco mais clara que o fundo para dar destaque */

    border:1px solid #cca353;

    border-right:none;

    border-radius:12px 0 0 12px;

    color:#cca353;

    display:flex;
    align-items:center;
    justify-content:center;

    writing-mode:vertical-rl;

    font-size:13px;
    font-weight:bold;

    letter-spacing:1px;

    cursor:pointer;

    z-index:999999;

    transition:
        right .35s ease,
        background .25s ease,
        color .25s ease;

    box-shadow: -5px 0 20px rgba(0,0,0,0.8); /* Sombra mais forte para desgrudar do conteúdo */
}

/* acompanha o xat no desktop */

.chat-aberto .etiqueta-chat{

    right:680px;
}

.etiqueta-chat:hover{

    background:#1a1a1a;

    color:#ffd700;
    border-color: #ffd700;
}

/* pulse */

.etiqueta-chat::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        box-shadow:0 0 0 0 rgba(204,163,83,.35);
    }

    70%{
        box-shadow:0 0 0 12px rgba(204,163,83,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(204,163,83,0);
    }
}

/* ================= LAYOUT ================= */

.conteudo-generall{

    width:100%;

    height:calc(100vh - 68px);

    display:flex;

    overflow:hidden;

    position:relative;
}

/* ================= API DESKTOP ================= */

.coluna-api{

    flex:1;

    height:100%;
    
    width: 100%;
    
    padding-right: 44px; 
}

.coluna-api iframe{

    width:100%;
    height:100%;

    border:none;

    display:block;
}

/* ================= CHAT DESKTOP ================= */

.coluna-chat{

    width:0;
    height:100%; 

    opacity:0;

    overflow:hidden;

    background:#161616;

    border-left:1px solid #262626;

    display: flex;
    flex-direction: column;

    transition:
        width .35s ease,
        opacity .25s ease;
}

/* aberto */

.chat-aberto .coluna-chat{

    width:680px;

    opacity:1;
}

/* ================= IFRAME CHAT CORRIGIDO PARA MANTER USUÁRIO NA PÁGINA ================= */

.chat-iframe{

    width:100%;
    flex: 1; 
}

.chat-iframe iframe{

    width:100%;
    height:100%;

    border:none;
    display: block;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    html,
    body{
        overflow:hidden;
    }

    header{
        padding:0 10px;
    }

    .logo img{
        height:34px;
    }

    .coluna-api {
        padding-right: 0;
    }

    /* ================= BOTÃO MOBILE (DESCOMPACTADO DO HEADER) ================= */

    .etiqueta-chat{

        position:relative;

        top:0;
        right:0 !important;

        transform:none;

        width:100%;
        height:48px;

        writing-mode:initial;

        border-radius:0;

        border-left:none;
        border-right:none;

        border-top:none;

        background:#111;

        border-bottom:2px solid #cca353;

        justify-content:center;

        font-size:14px;

        z-index:9999;
        box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    /* ================= LAYOUT MOBILE ================= */

    .conteudo-generall{

        display:flex;

        flex-direction:column;

        height:calc(100vh - 114px);
    }

    /* ================= CHAT MOBILE CORRIGIDO ================= */

    .coluna-chat{

        width:100%;
        height: 0;
        opacity:0;

        display: none; 
        flex-direction: column;
        overflow:hidden;

        border-left:none;
        border-bottom:1px solid #262626;

        transition: opacity .25s ease;
        order:1; 
    }

    /* aberto no mobile */

    .chat-aberto .coluna-chat{
        display: flex; 
        width:100%;
        height:380px;
        opacity:1;
    }

    /* ================= API MOBILE ================= */

    .coluna-api{

        flex:1;

        min-height:0;

        order:2; 
    }

}

</style>

</head>

<body>

<header>

    <div class="logo">

        <a
            href="https://oreidasurebet.com"
            target="_blank"
        >

            <img
                src="imagens/logo.png"
                alt="O Rei da Surebet"
            >

        </a>

    </div>

    <div class="menu">

        <button class="menu-button">
            ☰ Menu
        </button>

        <div class="dropdown">

            <strong>CALCULADORAS</strong>

            <a href="#">
                Calculadora Surebet
            </a>

            <a href="#">
                Calculadora Trade
            </a>

            <strong>FERRAMENTAS</strong>

            <a href="#">
                Fullscreen Bet
            </a>

            <a href="#">
                Scanner OddsAgora
            </a>

        </div>

    </div>

</header>

<div
    class="conteudo-generall"
    id="conteudo-geral"
>

    <div
        class="etiqueta-chat"
        id="etiqueta-chat"
        onclick="alternarChat()"
    >
        Abrir Chat
    </div>

    <div class="coluna-api">

        <iframe
            src="https://api.oreidasurebet.com"
        ></iframe>

    </div>

    <div class="coluna-chat">

        <div class="chat-iframe">

            <!-- CHAMADA EM IFRAME SEGURO: PRENDE O CHATANGO E EVITA REDIRECIONAMENTO NO CELULAR -->
            <iframe 
                src="https://reidasurebet.chatango.com" 
                scrolling="no"
            ></iframe>

        </div>

    </div>

</div>

<script>

function alternarChat(){

    const layout =
        document.getElementById(
            'conteudo-geral'
        );

    const botao =
        document.getElementById(
            'etiqueta-chat'
        );

    layout.classList.toggle(
        'chat-aberto'
    );

    if(
        layout.classList.contains(
            'chat-aberto'
        )
    ){

        botao.innerHTML =
            'Fechar Chat';

    }else{

        botao.innerHTML =
            'Abrir Chat';
    }
}

</script>

</body>
</html>
