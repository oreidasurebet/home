<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Rei da Surebet - Ferramentas, Calculadoras e Extensões para Apostas Esportivas</title>
  
  <!-- SEO -->
  <meta name="description" content="O Rei da Surebet - Ferramentas, calculadoras, scanners e extensões para apostas esportivas. Encontre surebets, calcule stakes perfeitas, maximize seus lucros e minimize riscos nas apostas.">
  <meta name="keywords" content="surebet, apostas esportivas, calculatora surebet, calculadora trade, skewed, extensão scanner, extensão limite de aposta, ferramentas para apostas, scanner de odds, scanner surebet, apostas sem risco, rei da surebet">
  <meta name="author" content="O Rei da Surebet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="imagens/favicon.png" type="image/png">

  <style>
    /* ================= ESTRUTURA GERAL DA PÁGINA ================= */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: #0d0d0d;
    }

    /* Header Fixo no Topo com os elementos alinhados lado a lado sempre */
    header {
      width: 100vw;
      box-sizing: border-box;
      flex-shrink: 0;
      z-index: 10000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #000;
      border-bottom: 1px solid #262626;
    }

    /* Estilização do Botão de Chat posicionado no centro do Header */
    .btn-header-chat-toggle {
      background-color: #161616;
      border: 1px solid #cca353;
      border-radius: 4px;
      color: #cca353;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-header-chat-toggle:hover {
      color: #ffd700;
      border-color: #ffd700;
      background-color: #222;
      box-shadow: 0 0 8px rgba(204, 163, 83, 0.3);
    }

    /* Área abaixo do Header: Divide o espaço entre os Iframes */
    .conteudo-iframes-wrapper {
      display: grid;
      grid-template-columns: 1fr 620px;
      flex: 1;
      width: 100vw;
      position: relative;
      transition: grid-template-columns 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Estado inicial: Oculta o xat e deixa a API em 100% da largura */
    .conteudo-iframes-wrapper.chat-oculto {
      grid-template-columns: 1fr 0px;
    }

    /* Garante o fechamento total do painel lateral */
    .conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral {
      visibility: hidden;
      overflow: hidden;
    }

    /* Contêiner do Iframe da API (Esquerda) */
    .coluna-api-principal {
      width: 100%;
      height: 100%;
    }

    .iframe-api-container {
      width: 100%;
      height: 100%;
    }
    .iframe-api-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ================= 🟢 BARRA LATERAL DIREITA NO DESKTOP (XAT.COM) ================= */
    .coluna-xat-lateral {
      display: flex;
      flex-direction: column;
      background-color: #161616;
      border-left: 1px solid #262626;
      height: 100%;
    }

    .header-chat-titulo {
      background-color: #111;
      padding: 15px;
      border-bottom: 1px solid #262626;
      font-size: 13px;
      font-weight: bold;
      color: #cca353;
      text-align: center;
      letter-spacing: 0.5px;
      font-family: sans-serif;
    }

    .container-iframe-xat {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .container-iframe-xat iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ================= 📱 RESPONSIVIDADE MOBILE CORRIGIDA ================= */
    @media (max-width: 900px) {
      header {
        padding: 10px;
        gap: 10px;
      }

      /* Mantém o botão alinhado de forma limpa no topo sem quebrar layout */
      .btn-header-chat-toggle {
        padding: 6px 12px;
        font-size: 11px;
      }

      .conteudo-iframes-wrapper {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      
      /* Xat fixado no topo, logo abaixo do header */
      .coluna-xat-lateral {
        order: 1;
        width: 100% !important;
        height: 400px; 
        flex-shrink: 0;
        border-left: none;
        border-bottom: 1px solid #262626;
      }

      /* Sua API desce dividindo a tela com o xat */
      .coluna-api-principal {
        order: 2;
        flex: 1;
        height: auto;
      }

      .conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral {
        display: none;
      }
      .conteudo-iframes-wrapper.chat-oculto .coluna-api-principal {
        height: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER COMPLETO COM O BOTÃO NO CENTRO TANTO NO PC QUANTO NO CELULAR -->
  <header>
    <div class="logo">
      <a href="https://oreidasurebet.com" target="_blank">
        <img src="imagens/logo.png" alt="O Rei da Surebet">
      </a>
    </div>

    <!-- 🔘 BOTÃO INTEGRADO DIRETAMENTE NO MENU SUPERIOR (FIXO) -->
    <button id="btn-toggle-chat" class="btn-header-chat-toggle" onclick="alternarLayoutChat()">
      Abrir Chat
    </button>

    <div class="menu">
      <button class="menu-button">☰ Menu</button>
      <div class="dropdown">
        <strong>CALCULADORAS</strong>
        <a href="calculadora_de_surebet_e_skewed">Calculadora de Surebet e Skewed</a>
        <a href="calculadora_trade_no_empate">Calculadora Trade no Empate</a>
        <strong>FERRAMENTAS</strong>
        <a href="extensão_fullscreen_bet">Extensão FullScreen Bet</a>
        <a href="../extensao_scanner_odds_agora">Extensão Scanner OddsAgora 2.0</a>
      </div>
    </div>
  </header>

  <!-- CONTÊINER OPERACIONAL DOS IFRAMES INICIADO FECHADO POR PADRÃO -->
  <div class="conteudo-iframes-wrapper chat-oculto" id="layout-container-global">
    
    <!-- ÁREA PRINCIPAL: IFRAME DA SUA API -->
    <div class="coluna-api-principal">
      <div class="iframe-api-container">
        <iframe src="https://api.oreidasurebet.com" allowtransparency="true"></iframe>
      </div>
    </div>

    <!-- PAINEL DO CHAT (620PX DESKTOP / 400PX NO TOPO MOBILE) -->
    <div class="coluna-xat-lateral">
      <div class="header-chat-titulo">
        Chat
      </div>
      <div class="container-iframe-xat">
        <iframe src="https://xat.com/embed/chat.php#id=220516405&gn=oreidasurebet" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

  </div>

  <script>
    function alternarLayoutChat() {
        const container = document.getElementById('layout-container-global');
        const btnChat = document.getElementById('btn-toggle-chat');
        
        container.classList.toggle('chat-oculto');
        
        // Modifica textualmente o botão fixado no cabeçalho superior
        if (container.classList.contains('chat-oculto')) {
            btnChat.innerText = 'Abrir Chat';
        } else {
            btnChat.innerText = 'Fechar Chat';
        }
    }
  </script>

</body>
</html>
