<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner - O Rei da Surebet</title>
  
  <meta name="description" content="Scanner O Rei da Surebet - Monitore e encontre surebets em tempo real para maximizar seus lucros e minimizar riscos nas apostas esportivas.">
  <meta name="keywords" content="surebet, scanner surebet, apostas esportivas, ferramentas para apostas, scanner de odds, rei da surebet">
  <meta name="author" content="O Rei da Surebet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="imagens/favicon.png" type="image/png">
  
  <style>
    /* Força a página principal a não ter barras de rolagem externas */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Remove o scroll da sua página principal */
    }
    
    body {
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0; /* Impede que o header seja espremido */
    }
    
    /* Configuração para o iframe expandir totalmente no espaço restante */
    .scanner-full-container {
      flex-grow: 1;
      width: 100vw; /* Garante 100% da largura visual da tela */
      height: calc(100vh - var(--header-height, 10vh)); /* Ocupa exatamente do fim do header ao fim da tela */
      border: none;
      margin: 0;
      padding: 0;
    }
    
    .scanner-full-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      /* Ativa e gerencia o scroll interno do iframe de forma nativa e suave */
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch; 
    }

    /* Ajuste de proporção dinâmico baseado na sua media query do mobile */
    @media (max-width: 768px) {
      .scanner-full-container {
        height: calc(100vh - 8vh); /* Desconta a altura menor do header mobile (8vh) */
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="https://oreidasurebet.com" target="_blank">
        <img src="imagens/logo.png" alt="O Rei da Surebet">
      </a>
    </div>

    <div class="menu">
      <button class="menu-button">☰ Menu</button>
      <div class="dropdown">
        <strong>CALCULADORAS</strong>
        <a href="calculadora_de_surebet_e_skewed">Calculadora de Surebet e Skewed</a>
        <a href="calculadora_trade_no_empate">Calculadora Trade no Empate</a>
        <strong>FERRAMENTAS</strong>
        <a href="extensão_fullscreen_bet">Extensão FullScreen Bet</a>
        <a href="../extensao_scanner_odds_agora">Extensão Scanner OddsAgora 2.0</a>
      </div>
    </div>
  </header>

  <div class="scanner-full-container">
    <iframe src="https://api.oreidasurebet.com" title="Scanner O Rei da Surebet"></iframe>
  </div>

</body>
</html>
