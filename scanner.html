<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>O Rei da Surebet - Scanner</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="imagens/favicon.png" type="image/png">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#0d0d0d;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

/* ================= HEADER ================= */

header{
    width:100%;
    height:68px;

    background:#000;

    border-bottom:1px solid #262626;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 18px;

    position:relative;
    z-index:10000;

    flex-shrink:0;
}

/* LOGO */

.logo img{
    height:42px;
    display:block;
}

/* ÁREA DIREITA */

.header-right{
    display:flex;
    align-items:center;
    gap:12px;
}

/* ================= BOTÃO CHAT ================= */

.btn-header-chat-toggle{

    width:42px;
    height:42px;

    border-radius:10px;

    background:#111;
    border:1px solid #cca353;

    color:#cca353;

    font-size:20px;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:all .2s ease;

    animation:pulseChat 1.8s infinite;
}

.btn-header-chat-toggle:hover{

    background:#1b1b1b;
    border-color:#ffd700;
    color:#ffd700;

    box-shadow:0 0 10px rgba(255,215,0,.2);
}

/* quando aberto */

.btn-header-chat-toggle.chat-aberto{
    animation:none;
}

/* pulse */

@keyframes pulseChat{

    0%{
        box-shadow:0 0 0 0 rgba(204,163,83,.55);
    }

    70%{
        box-shadow:0 0 0 10px rgba(204,163,83,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(204,163,83,0);
    }
}

/* ================= MENU ================= */

.menu{
    position:relative;
}

.menu-button{

    background:none;
    border:none;

    color:#d4a64f;

    font-size:18px;

    cursor:pointer;

    display:flex;
    align-items:center;

    gap:8px;
}

.dropdown{

    position:absolute;

    top:50px;
    right:0;

    width:260px;

    background:#111;

    border:1px solid #262626;

    border-radius:10px;

    padding:15px;

    display:none;

    z-index:9999;
}

.menu:hover .dropdown{
    display:block;
}

.dropdown strong{
    color:#cca353;
    display:block;
    margin-bottom:10px;
    margin-top:10px;
    font-size:13px;
}

.dropdown a{
    display:block;
    color:#ddd;
    text-decoration:none;
    padding:8px 0;
    font-size:14px;
}

.dropdown a:hover{
    color:#ffd700;
}

/* ================= CONTEÚDO ================= */

.conteudo-iframes-wrapper{

    width:100%;
    height:calc(100vh - 68px);

    display:grid;

    grid-template-columns:1fr 620px;

    transition:grid-template-columns .3s cubic-bezier(.25,.8,.25,1);
}

/* CHAT FECHADO */

.conteudo-iframes-wrapper.chat-oculto{
    grid-template-columns:1fr 0px;
}

.conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral{
    visibility:hidden;
    overflow:hidden;
}

/* ================= API ================= */

.coluna-api-principal{
    width:100%;
    height:100%;
}

.iframe-api-container{
    width:100%;
    height:100%;
}

.iframe-api-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* ================= CHAT ================= */

.coluna-xat-lateral{

    width:100%;
    height:100%;

    background:#161616;

    border-left:1px solid #262626;

    display:flex;
    flex-direction:column;
}

.header-chat-titulo{

    background:#111;

    border-bottom:1px solid #262626;

    padding:14px;

    text-align:center;

    color:#cca353;

    font-size:13px;
    font-weight:bold;

    letter-spacing:.5px;
}

.container-iframe-xat{
    flex:1;
}

.container-iframe-xat iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    header{
        padding:0 10px;
    }

    .logo img{
        height:34px;
    }

    .menu-button{
        font-size:16px;
    }

    .conteudo-iframes-wrapper{

        display:flex;
        flex-direction:column;
    }

    .coluna-xat-lateral{

        order:1;

        width:100% !important;

        height:400px;

        border-left:none;
        border-bottom:1px solid #262626;
    }

    .coluna-api-principal{

        order:2;

        flex:1;
    }

    .conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral{
        display:none;
    }

    .conteudo-iframes-wrapper.chat-oculto .coluna-api-principal{
        height:100%;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

    <!-- LOGO -->

    <div class="logo">
        <a href="https://oreidasurebet.com" target="_blank">
            <img src="imagens/logo.png" alt="O Rei da Surebet">
        </a>
    </div>

    <!-- DIREITA -->

    <div class="header-right">

        <!-- BOTÃO CHAT -->

        <button
            id="btn-toggle-chat"
            class="btn-header-chat-toggle"
            onclick="alternarLayoutChat()"
            title="Abrir Chat"
        >
            💬
        </button>

        <!-- MENU -->

        <div class="menu">

            <button class="menu-button">
                ☰ Menu
            </button>

            <div class="dropdown">

                <strong>CALCULADORAS</strong>

                <a href="calculadora_de_surebet_e_skewed">
                    Calculadora de Surebet e Skewed
                </a>

                <a href="calculadora_trade_no_empate">
                    Calculadora Trade no Empate
                </a>

                <strong>FERRAMENTAS</strong>

                <a href="extensão_fullscreen_bet">
                    Extensão FullScreen Bet
                </a>

                <a href="../extensao_scanner_odds_agora">
                    Extensão Scanner OddsAgora 2.0
                </a>

            </div>

        </div>

    </div>

</header>

<!-- CONTEÚDO -->

<div
    class="conteudo-iframes-wrapper chat-oculto"
    id="layout-container-global"
>

    <!-- API -->

    <div class="coluna-api-principal">

        <div class="iframe-api-container">

            <iframe
                src="https://api.oreidasurebet.com"
                allowtransparency="true"
            ></iframe>

        </div>

    </div>

    <!-- CHAT -->

    <div class="coluna-xat-lateral">

        <div class="header-chat-titulo">
            Chat
        </div>

        <div class="container-iframe-xat">

            <iframe
                src="https://xat.com/embed/chat.php#id=220516405&gn=oreidasurebet"
                allowtransparency="true"
                scrolling="no"
            ></iframe>

        </div>

    </div>

</div>

<script>

function alternarLayoutChat(){

    const container = document.getElementById('layout-container-global');

    const btnChat = document.getElementById('btn-toggle-chat');

    container.classList.toggle('chat-oculto');

    if(container.classList.contains('chat-oculto')){

        btnChat.innerHTML = '💬';

        btnChat.classList.remove('chat-aberto');

        btnChat.title = 'Abrir Chat';

    }else{

        btnChat.innerHTML = '✖';

        btnChat.classList.add('chat-aberto');

        btnChat.title = 'Fechar Chat';
    }
}

</script>

</body>
</html>
