<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>O Rei da Surebet - Scanner</title>

<link rel="stylesheet" href="style.css">

<link
    rel="icon"
    href="imagens/favicon.png"
    type="image/png"
>

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100vh;

    overflow:hidden;

    background:#0d0d0d;

    font-family:
        Segoe UI,
        Tahoma,
        Geneva,
        Verdana,
        sans-serif;
}

body{
    position:relative;
}

/* ================= HEADER ================= */

header{

    width:100%;
    height:68px;

    background:#000;

    border-bottom:1px solid #262626;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 18px;

    position:relative;

    z-index:10000;

    flex-shrink:0;
}

/* ================= LOGO ================= */

.logo img{

    height:42px;

    display:block;
}

/* ================= MENU ================= */

.menu{
    position:relative;
}

.menu-button{

    background:none;
    border:none;

    color:#d4a64f;

    font-size:18px;

    cursor:pointer;

    display:flex;
    align-items:center;

    gap:8px;
}

.dropdown{

    position:absolute;

    top:50px;
    right:0;

    width:260px;

    background:#111;

    border:1px solid #262626;

    border-radius:10px;

    padding:15px;

    display:none;

    z-index:9999;
}

.menu:hover .dropdown{
    display:block;
}

.dropdown strong{

    color:#cca353;

    display:block;

    margin-bottom:10px;
    margin-top:10px;

    font-size:13px;
}

.dropdown a{

    display:block;

    color:#ddd;

    text-decoration:none;

    padding:8px 0;

    font-size:14px;
}

.dropdown a:hover{
    color:#ffd700;
}

/* ================= CONTEÚDO ================= */

.conteudo-iframes-wrapper{

    width:100%;

    height:calc(100vh - 68px);

    display:grid;

    grid-template-columns:1fr 620px;

    transition:grid-template-columns .35s ease;
}

/* ================= API ================= */

.coluna-api-principal{

    width:100%;
    height:100%;
}

.iframe-api-container{

    width:100%;
    height:100%;
}

.iframe-api-container iframe{

    width:100%;
    height:100%;

    border:none;

    display:block;
}

/* ================= CHAT ================= */

.coluna-xat-lateral{

    width:620px;
    height:100%;

    background:#161616;

    border-left:1px solid #262626;

    display:flex;
    flex-direction:column;

    overflow:hidden;

    transition:.35s ease;
}

/* ================= FECHADO ================= */

.conteudo-iframes-wrapper.chat-oculto{

    grid-template-columns:1fr 0px;
}

.conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral{

    transform:translateX(100%);

    opacity:0;
}

/* ================= HEADER CHAT ================= */

.header-chat-titulo{

    background:#111;

    border-bottom:1px solid #262626;

    padding:14px;

    text-align:center;

    color:#cca353;

    font-size:13px;
    font-weight:bold;

    letter-spacing:.5px;
}

/* ================= IFRAME CHAT ================= */

.container-iframe-xat{
    flex:1;
}

.container-iframe-xat iframe{

    width:100%;
    height:100%;

    border:none;

    display:block;
}

/* ================= ETIQUETA DESKTOP ================= */

.etiqueta-chat{

    position:fixed;

    top:50%;

    right:0;

    transform:translateY(-50%);

    width:42px;
    height:170px;

    background:#000;

    border:1px solid #cca353;
    border-right:none;

    border-radius:12px 0 0 12px;

    color:#cca353;

    display:flex;
    align-items:center;
    justify-content:center;

    writing-mode:vertical-rl;

    font-size:13px;
    font-weight:bold;

    letter-spacing:1px;

    cursor:pointer;

    user-select:none;

    z-index:99999;

    box-shadow:
        -4px 0 14px rgba(0,0,0,.35);

    transition:
        right .35s ease,
        background .25s ease,
        color .25s ease,
        border-color .25s ease,
        box-shadow .25s ease;
}

/* acompanha o painel */

.conteudo-iframes-wrapper:not(.chat-oculto)
~ .etiqueta-chat{

    right:620px;
}

.etiqueta-chat:hover{

    background:#111;

    color:#ffd700;

    border-color:#ffd700;

    box-shadow:
        -4px 0 18px rgba(204,163,83,.25);
}

/* ================= PULSE ================= */

.etiqueta-chat::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    animation:pulseEtiqueta 2s infinite;

    pointer-events:none;
}

@keyframes pulseEtiqueta{

    0%{
        box-shadow:0 0 0 0 rgba(204,163,83,.45);
    }

    70%{
        box-shadow:0 0 0 12px rgba(204,163,83,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(204,163,83,0);
    }
}

/* ================= MOBILE ================= */

@media(max-width:900px){

    html,
    body{
        overflow:hidden;
    }

    header{
        padding:0 10px;
        flex-shrink:0;
    }

    .logo img{
        height:34px;
    }

    .menu-button{
        font-size:16px;
    }

    /* ================= ETIQUETA MOBILE ================= */

    .etiqueta-chat{

        position:relative;

        top:0;
        right:0 !important;

        transform:none;

        width:100%;
        height:34px;

        writing-mode:initial;

        border-radius:0;

        border-left:none;
        border-right:none;
        border-top:none;

        justify-content:center;

        z-index:9999;
    }

    /* ================= LAYOUT ================= */

    .conteudo-iframes-wrapper{

        width:100%;

        height:calc(100vh - 102px);

        display:flex;

        flex-direction:column;
    }

    /* ================= CHAT ================= */

    .coluna-xat-lateral{

        order:1;

        width:100%;

        height:380px;

        min-height:380px;

        border-left:none;

        border-bottom:1px solid #262626;

        transition:
            height .35s ease,
            min-height .35s ease,
            opacity .25s ease;

        opacity:1;

        transform:none;

        overflow:hidden;

        flex-shrink:0;
    }

    /* ================= API ================= */

    .coluna-api-principal{

        order:2;

        flex:1;

        min-height:0;

        height:100%;
    }

    /* ================= FECHADO ================= */

    .conteudo-iframes-wrapper.chat-oculto .coluna-xat-lateral{

        height:0;

        min-height:0;

        opacity:0;

        border-bottom:none;
    }

}

/* remove movimento lateral no mobile */

@media(max-width:900px){

    .conteudo-iframes-wrapper:not(.chat-oculto)
    ~ .etiqueta-chat{

        right:0 !important;
    }
}

</style>

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <!-- LOGO -->

    <div class="logo">

        <a
            href="https://oreidasurebet.com"
            target="_blank"
        >

            <img
                src="imagens/logo.png"
                alt="O Rei da Surebet"
            >

        </a>

    </div>

    <!-- MENU -->

    <div class="menu">

        <button class="menu-button">
            ☰ Menu
        </button>

        <div class="dropdown">

            <strong>CALCULADORAS</strong>

            <a href="calculadora_de_surebet_e_skewed">
                Calculadora de Surebet e Skewed
            </a>

            <a href="calculadora_trade_no_empate">
                Calculadora Trade no Empate
            </a>

            <strong>FERRAMENTAS</strong>

            <a href="extensão_fullscreen_bet">
                Extensão FullScreen Bet
            </a>

            <a href="../extensao_scanner_odds_agora">
                Extensão Scanner OddsAgora 2.0
            </a>

        </div>

    </div>

</header>

<!-- ================= ETIQUETA ================= -->

<div
    class="etiqueta-chat"
    id="etiqueta-chat"
    onclick="alternarLayoutChat()"
>
    Abrir Chat
</div>

<!-- ================= CONTEÚDO ================= -->

<div
    class="conteudo-iframes-wrapper chat-oculto"
    id="layout-container-global"
>

    <!-- ================= CHAT ================= -->

    <div class="coluna-xat-lateral">

        <div class="header-chat-titulo">
            Chat
        </div>

        <div class="container-iframe-xat">

            <iframe
                src="https://xat.com/embed/chat.php#id=220516405&gn=oreidasurebet"
                allowtransparency="true"
                scrolling="no"
            ></iframe>

        </div>

    </div>

    <!-- ================= API ================= -->

    <div class="coluna-api-principal">

        <div class="iframe-api-container">

            <iframe
                src="https://api.oreidasurebet.com"
                allowtransparency="true"
            ></iframe>

        </div>

    </div>

</div>

<!-- ================= SCRIPT ================= -->

<script>

function alternarLayoutChat(){

    const container =
        document.getElementById(
            'layout-container-global'
        );

    const etiqueta =
        document.getElementById(
            'etiqueta-chat'
        );

    container.classList.toggle(
        'chat-oculto'
    );

    if(
        container.classList.contains(
            'chat-oculto'
        )
    ){

        etiqueta.innerText =
            'Abrir Chat';

    }else{

        etiqueta.innerText =
            'Fechar Chat';
    }
}

</script>

</body>
</html>
